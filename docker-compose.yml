version: "3.9"

# =============================================================================
# SERVIÇOS
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Banco de dados PostgreSQL
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: tstore_estoque
      POSTGRES_USER: tstore_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tstore_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tstore_user -d tstore_estoque"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Aplicação Node.js
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://tstore_user:${POSTGRES_PASSWORD:-tstore_password}@db:5432/tstore_estoque
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_SHEETS_API_KEY: ${GOOGLE_SHEETS_API_KEY}
    depends_on:
      db:
        condition: service_healthy

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres_data:
    driver: local
